<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SBS 作业追踪</title>
<meta name="theme-color" content="#2b6cb0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SBS作业追踪">

<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect fill='%232b6cb0' width='32' height='32' rx='6'/><text x='16' y='22' text-anchor='middle' fill='white' font-size='16' font-family='sans-serif'>S</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f0f4f8;color:#2d3748}

header{background:#2b6cb0;color:#fff;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
header h1{font-size:17px}
.header-btns{display:flex;gap:6px;flex-wrap:wrap}

.class-tabs{display:flex;background:#fff;border-bottom:2px solid #e2e8f0;overflow-x:auto;padding:0 10px}
.class-tab{flex-shrink:0;padding:9px 14px;border:none;background:none;cursor:pointer;font-size:12px;color:#718096;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap}
.class-tab:hover{color:#2b6cb0}
.class-tab.active{color:#2b6cb0;border-bottom-color:#2b6cb0;font-weight:600}

main{max-width:1200px;margin:0 auto;padding:12px}

/* Stats */
.stats-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:12px}
.stat-item{background:#fff;border-radius:8px;padding:12px;text-align:center;box-shadow:0 1px 2px rgba(0,0,0,.05)}
.stat-item .num{font-size:26px;font-weight:700}
.stat-item .lbl{font-size:10px;color:#718096;margin-top:2px}
.stat-item.g .num{color:#38a169}
.stat-item.r .num{color:#e53e3e}
.stat-item.b .num{color:#3182ce}
.stat-item.o .num{color:#dd6b20}
.stat-item.p .num{color:#805ad5}

.card{background:#fff;border-radius:8px;padding:14px;margin-bottom:12px;box-shadow:0 1px 2px rgba(0,0,0,.05)}
.card h3{font-size:14px;margin-bottom:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}

.btn{display:inline-block;padding:6px 12px;border:none;border-radius:5px;font-size:12px;cursor:pointer;transition:.2s}
.btn-p{background:#2b6cb0;color:#fff}
.btn-p:hover{background:#2c5282}
.btn-g{background:#38a169;color:#fff}
.btn-g:hover{background:#2f855a}
.btn-r{background:#e53e3e;color:#fff}
.btn-r:hover{background:#c53030}
.btn-o{background:#edf2f7;color:#4a5568;border:1px solid #e2e8f0}
.btn-o:hover{background:#e2e8f0}
.btn-xs{padding:2px 7px;font-size:10px}
.btn-sm{padding:4px 9px;font-size:11px}

.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th,td{padding:7px 9px;text-align:left;border-bottom:1px solid #e2e8f0}
th{background:#f7fafc;color:#4a5568;font-weight:600;white-space:nowrap;font-size:11px}
tr:hover{background:#f7fafc}
td.actions{white-space:nowrap}

.badge{display:inline-block;padding:2px 7px;border-radius:9px;font-size:10px;font-weight:600}
.badge-ok{background:#c6f6d5;color:#276749}
.badge-no{background:#fed7d7;color:#9b2c2c}
.badge-warn{background:#feebc8;color:#9c4221}
.badge-info{background:#bee3f8;color:#2a4365}
.badge-purple{background:#e9d8fd;color:#553c9a}

/* Type-specific badge colors */
.type-fuxi{background:#ebf8ff;color:#2b6cb0;border:1px solid #bee3f8}
.type-ceshi{background:#faf5ff;color:#805ad5;border:1px solid #e9d8fd}
.type-xiti{background:#fff5f5;color:#c53030;border:1px solid #fed7d7}
.type-lianxi{background:#f0fff4;color:#276749;border:1px solid #c6f6d5}

.f-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.f-grp{display:flex;flex-direction:column;gap:2px}
.f-grp label{font-size:10px;color:#718096;font-weight:600}
.f-grp input,.f-grp select,.f-grp textarea{padding:6px 9px;border:1px solid #e2e8f0;border-radius:5px;font-size:12px}
.f-grp input:focus,.f-grp select:focus{outline:none;border-color:#2b6cb0;box-shadow:0 0 0 2px rgba(43,108,176,.12)}

.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:100;justify-content:center;align-items:center}
.modal.on{display:flex}
.modal-inner{background:#fff;border-radius:12px;padding:18px;max-width:560px;width:90%;max-height:80vh;overflow-y:auto}

.empty{text-align:center;color:#a0aec0;padding:28px;font-size:13px}

.pbar{height:4px;background:#e2e8f0;border-radius:2px;overflow:hidden;min-width:50px}
.pfill{height:100%;border-radius:2px}

/* Submission grid */
.check-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:5px}
.check-item{display:flex;align-items:center;gap:5px;padding:7px 9px;border-radius:6px;border:1px solid #e2e8f0;cursor:pointer;font-size:12px;transition:.2s;user-select:none}
.check-item:hover{background:#f7fafc}
.check-item.done{background:#f0fff4;border-color:#c6f6d5}
.check-item.undone{background:#fff5f5;border-color:#fed7d7}
.check-item input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:#38a169}
.check-item .name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.check-item .info{font-size:10px;color:#718096;cursor:pointer}
.check-item .info:hover{color:#2b6cb0}

/* Type filter chips */
.type-filters{display:flex;gap:4px;flex-wrap:wrap}
.type-chip{padding:4px 10px;border-radius:12px;border:1px solid #e2e8f0;background:#fff;font-size:11px;cursor:pointer;transition:.2s;white-space:nowrap}
.type-chip:hover{border-color:#2b6cb0;color:#2b6cb0}
.type-chip.active{background:#2b6cb0;color:#fff;border-color:#2b6cb0}

/* Summary row */
.summary-row{font-size:12px;color:#718096;margin-bottom:8px}

@media print{
  header,.class-tabs,.btn,button,.modal,.header-btns,.type-filters{display:none!important}
  .card{box-shadow:none;border:1px solid #e2e8f0;break-inside:avoid}
  body{background:#fff}
  .check-item.done{background:#fff;border-color:#c6f6d5}
  .check-item.undone{background:#fff;border-color:#e2e8f0}
}

@media (max-width:768px){
  .check-grid{grid-template-columns:repeat(2,1fr)}
  .stats-bar{grid-template-columns:repeat(3,1fr)}
}

/* Cloud sync */
.sync-card{border:1px solid #e2e8f0;background:#fffbeb}
.sync-card.configured{border-color:#c6f6d5;background:#f0fff4}
.sync-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px}
.sync-dot.ok{background:#38a169}
.sync-dot.err{background:#e53e3e}
.sync-dot.idle{background:#a0aec0}
.sync-msg{font-size:11px;color:#718096;margin-left:4px}
.token-row{display:flex;gap:6px;align-items:center}
.token-row input{flex:1}
.err-check-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:3px}
.err-check{display:flex;align-items:center;gap:3px;font-size:11px;cursor:pointer;padding:2px 4px;border-radius:3px;white-space:nowrap}
.err-check:hover{background:#edf2f7}
.err-check input[type=checkbox]{width:13px;height:13px;cursor:pointer;accent-color:#2b6cb0}
.q-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px}
.q-tile{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;transition:.15s;border:2px solid transparent;user-select:none}
.q-tile.ok{background:#f0fff4;color:#38a169;border-color:#c6f6d5}
.q-tile.ok:hover{background:#c6f6d5}
.q-tile.wrong{background:#fff5f5;color:#e53e3e;border-color:#feb2b2}
.q-tile.wrong:hover{background:#fed7d7}
</style>
</head>
<body>

<header>
  <h1>SBS 作业追踪</h1>
  <div class="header-btns">
    <button class="btn btn-sm" style="background:rgba(255,255,255,.2);color:#fff" onclick="exportData()">导出</button>
    <button class="btn btn-sm" style="background:rgba(255,255,255,.2);color:#fff" onclick="importDataPrompt()">导入</button>
    <button class="btn btn-sm" style="background:rgba(255,255,255,.2);color:#fff" onclick="window.print()">打印</button>
  </div>
</header>

<div style="background:#fff;border-bottom:2px solid #e2e8f0;padding:8px 12px;display:flex;align-items:center;gap:8px">
  <span style="font-size:12px;color:#4a5568;font-weight:600;white-space:nowrap">班级：</span>
  <select id="class-sel" style="font-size:13px;padding:6px 10px;border:1px solid #e2e8f0;border-radius:5px;flex:1;max-width:260px" onchange="onClassChange()">
    <option value="">全部班级</option>
  </select>
</div>

<main>
  <!-- Period & Stats -->
  <div style="display:flex;justify-content:flex-end;margin-bottom:6px">
    <select id="period-sel" style="font-size:12px;padding:4px 8px;border:1px solid #e2e8f0;border-radius:4px" onchange="onPeriodChange()">
      <option value="all">全部时间</option>
      <option value="thisWeek">本周</option>
      <option value="lastWeek">上周</option>
      <option value="thisMonth">本月</option>
      <option value="lastMonth">上月</option>
    </select>
  </div>
  <div class="stats-bar" id="stats-bar"></div>

  <!-- Quick submit area - main working area -->
  <div class="card">
    <h3>
      提交登记
      <select id="qs-type" style="font-size:12px;padding:3px 6px;border:1px solid #e2e8f0;border-radius:4px" onchange="onTypeFilterChange()">
        <option value="">全部类型</option>
      </select>
      <select id="qs-assignment" style="font-size:12px;padding:3px 6px;border:1px solid #e2e8f0;border-radius:4px;min-width:160px" onchange="renderQuickSubmit()"></select>
      <button class="btn btn-sm btn-p" onclick="openAddAssignment()">+ 新作业</button>
    </h3>
    <div id="quick-submit-grid"></div>
  </div>

  <!-- Error details - only for 测试卷 -->
  <div class="card" id="error-card">
    <h3>错题详情（仅测试卷）</h3>
    <div id="error-table"></div>
  </div>

  <!-- Management -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
    <div class="card">
      <h3>学生 <button class="btn btn-sm btn-p" onclick="openAddStudent()">+ 添加</button></h3>
      <div id="student-list"></div>
    </div>
    <div class="card">
      <h3>作业 <button class="btn btn-sm btn-p" onclick="openAddAssignment()">+ 添加</button></h3>
      <div id="assignment-list"></div>
    </div>
  </div>

  <!-- Cloud Sync -->
  <div class="card sync-card" id="sync-card">
    <h3>云端同步 <span class="sync-dot idle" id="sync-dot"></span><span class="sync-msg" id="sync-msg">未配置</span></h3>
    <div id="sync-body">
      <p style="font-size:12px;color:#718096;margin-bottom:8px">配置后可让电脑和手机的数据自动同步，所有设备共享一份数据。</p>
      <div id="sync-setup">
        <p style="font-size:12px;margin-bottom:4px"><strong>第1步：</strong> <a href="https://github.com/settings/tokens" target="_blank" style="color:#2b6cb0">点这里创建 GitHub Token</a> → 点 "Generate new token (classic)" → Note 填 "sbs-tracker" → 勾选 <code>public_repo</code> → 点底部 Generate → 复制生成的 token</p>
        <p style="font-size:12px;margin-bottom:8px"><strong>第2步：</strong> 把 token 粘贴到下面，点保存</p>
        <div class="token-row">
          <input type="password" id="sync-token" placeholder="粘贴 GitHub Token..." style="font-size:12px;padding:5px 8px;border:1px solid #e2e8f0;border-radius:4px">
          <button class="btn btn-sm btn-p" onclick="saveToken()">保存并同步</button>
        </div>
      </div>
      <div id="sync-active" style="display:none">
        <button class="btn btn-sm btn-p" onclick="syncNow()">立即同步</button>
        <button class="btn btn-sm btn-o" onclick="resetToken()">取消同步</button>
        <span style="font-size:11px;color:#a0aec0" id="sync-time"></span>
      </div>
      <div id="sync-err" style="display:none;color:#e53e3e;font-size:11px;margin-top:6px"></div>
    </div>
  </div>
</main>

<div class="modal" id="modal"><div class="modal-inner" id="modal-inner"></div></div>

<script>
const CLASS_NAMES = [
  '周六SBS 15:00班','周六SBS 16:40班','周日SBS 10:40班',
  '周日SBS 13:00班','周日SBS 14:00班','周日SBS 15:00班',
  'K3 周六10:40-1','K3 周六9:00-1','K3 周日10:40-1'
];

const ASSIGN_TYPES = ['复习作业','测试卷','习题','练习册'];

const ERROR_REASONS = [
  '单复数错误','be动词混淆(am/is/are)','单词背错','时态错误',
  '代词错误','冠词遗漏/误用','介词错误','语序错误',
  '第三人称单数','拼写错误','句型错误',
  '阅读理解错误','听力错误','审题不清',
  '粗心大意','书写不规范','未掌握知识点'
];

const KEY = 'sbs_tracker_v3';
const SYNC_TOKEN_KEY = 'sbs_sync_token';
const REPO_OWNER = 'xue1987125';
const REPO_NAME = 'sbs-tracker';
const DATA_FILE = 'data.json';

let data = { students:[], assignments:[], submissions:[] };
let currentClass = '';
let typeFilter = '';
let periodFilter = 'all';
let _syncBusy = false;

function save(){
  data._modified = Date.now();
  localStorage.setItem(KEY, JSON.stringify(data));
  scheduleCloudSync();
}

function load(){
  const r = localStorage.getItem(KEY);
  if(r){
    try{ data = JSON.parse(r) }catch(e){}
    if(!data.students) data.students = [];
    if(!data.assignments) data.assignments = [];
    if(!data.submissions) data.submissions = [];
  }
}

let _syncTimer = null;
function scheduleCloudSync(){
  if(_syncTimer) clearTimeout(_syncTimer);
  _syncTimer = setTimeout(function(){ syncToCloud(); }, 1500);
}

// ====== CLOUD SYNC ======
function getToken(){ return localStorage.getItem(SYNC_TOKEN_KEY) }

function updateSyncUI(){
  const token = getToken();
  const dot = $('sync-dot');
  const msg = $('sync-msg');
  const setup = $('sync-setup');
  const active = $('sync-active');
  const card = $('sync-card');
  if(token){
    if(setup) setup.style.display = 'none';
    if(active) active.style.display = 'block';
    if(card) card.classList.add('configured');
  } else {
    if(setup) setup.style.display = 'block';
    if(active) active.style.display = 'none';
    if(card) card.classList.remove('configured');
    if(dot){ dot.className = 'sync-dot idle'; }
    if(msg){ msg.textContent = '未配置'; }
  }
}

function syncNow(){
  const token = getToken();
  if(!token){ alert('请先在下方设置 GitHub Token'); return; }
  syncToCloud(token, true);
}

function saveToken(){
  const token = $('sync-token').value.trim();
  if(!token){ alert('请输入 Token'); return; }
  if(!token.startsWith('ghp_') && !token.startsWith('github_pat_')){
    alert('Token 格式看起来不对，GitHub token 通常以 ghp_ 或 github_pat_ 开头。');
    return;
  }
  localStorage.setItem(SYNC_TOKEN_KEY, token);
  $('sync-token').value = '';
  updateSyncUI();
  // Push local data to cloud immediately
  data._modified = Date.now();
  localStorage.setItem(KEY, JSON.stringify(data));
  syncToCloud(token, true);
}

function resetToken(){
  if(!confirm('取消云端同步？数据会保留在本地，但不再自动同步到云端。')) return;
  localStorage.removeItem(SYNC_TOKEN_KEY);
  updateSyncUI();
}

async function syncToCloud(tokenOverride, force){
  if(_syncBusy && !force) return;
  const token = tokenOverride || getToken();
  if(!token) return;
  _syncBusy = true;
  const dot = $('sync-dot');
  const msg = $('sync-msg');
  const errEl = $('sync-err');
  try{
    if(dot){ dot.className = 'sync-dot idle'; }
    if(msg){ msg.textContent = '同步中...'; }
    if(errEl){ errEl.style.display = 'none'; }

    const apiUrl = 'https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME + '/contents/' + DATA_FILE;
    const content = JSON.stringify(data, null, 2);

    // Try up to 3 times, re-fetching SHA each time on conflict
    let lastErr = null;
    for(let attempt = 0; attempt < 3; attempt++){
      // Get current SHA
      let sha = null;
      try{
        const getResp = await fetch(apiUrl, { headers: { 'Authorization': 'token ' + token } });
        if(getResp.ok){
          const info = await getResp.json();
          sha = info.sha;
        }
      }catch(e){}

      const body = { message: 'sync data', content: btoa(unescape(encodeURIComponent(content))) };
      if(sha) body.sha = sha;

      const putResp = await fetch(apiUrl, {
        method: 'PUT',
        headers: { 'Authorization': 'token ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });

      if(putResp.ok){
        if(dot) dot.className = 'sync-dot ok';
        const now = new Date();
        const timeStr = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0') + ':' + now.getSeconds().toString().padStart(2,'0');
        if(msg) msg.textContent = '已同步';
        const timeEl = $('sync-time');
        if(timeEl) timeEl.textContent = '上次同步：' + timeStr;
        if(errEl) errEl.style.display = 'none';
        _syncBusy = false;
        return;
      }else if(putResp.status === 409){
        // SHA conflict — retry after re-fetching SHA
        lastErr = new Error('冲突重试中...');
        await new Promise(function(r){ setTimeout(r, 500); });
        continue;
      }else{
        const errData = await putResp.json().catch(function(){ return {} });
        throw new Error(errData.message || 'HTTP ' + putResp.status);
      }
    }
    throw lastErr || new Error('重试失败');
  }catch(e){
    if(dot) dot.className = 'sync-dot err';
    if(msg) msg.textContent = '同步失败';
    if(errEl){ errEl.style.display = 'block'; errEl.textContent = '错误：' + e.message; }
  }
  _syncBusy = false;
}

async function syncFromCloud(){
  const dataUrl = 'https://' + REPO_OWNER + '.github.io/' + REPO_NAME + '/' + DATA_FILE;
  try{
    const resp = await fetch(dataUrl);
    if(!resp.ok) return false;
    const cloudData = await resp.json();
    if(!cloudData || !cloudData.students) return false;
    const cloudTime = cloudData._modified || 0;
    const localTime = data._modified || 0;
    if(cloudTime > localTime){
      if(confirm('云端有更新的数据（' + new Date(cloudTime).toLocaleString() + '），是否同步到本地？\n\n当前本地数据：' + new Date(localTime).toLocaleString() + '\n\n选"确定"用云端数据覆盖本地，选"取消"保留本地数据。')){
        data = cloudData;
        localStorage.setItem(KEY, JSON.stringify(data));
        return true;
      }
    }
  }catch(e){}
  return false;
}

function $(id){ return document.getElementById(id) }
function ts(){ return new Date().toISOString().slice(0,16) }
function fd(d){ return d ? d.slice(0,10) : '' }
function esc(s){ const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML }
function gs(id){ return data.students.find(s=>s.id===id) }
function ga(id){ return data.assignments.find(a=>a.id===id) }
function studentsInClass(cls){ return cls ? data.students.filter(s=>s.group===cls) : data.students }
function assignmentsInClass(cls){ return cls ? data.assignments.filter(a=>(a.classGroup||'')===cls) : data.assignments }

function filterByPeriod(assignments){
  if(periodFilter === 'all') return assignments;
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  let start, end;
  if(periodFilter === 'thisWeek'){
    const dow = today.getDay() || 7; // Mon=1, Sun=7
    start = new Date(today); start.setDate(today.getDate() - dow + 1);
    end = new Date(start); end.setDate(start.getDate() + 7);
  }else if(periodFilter === 'lastWeek'){
    const dow = today.getDay() || 7;
    end = new Date(today); end.setDate(today.getDate() - dow + 1);
    start = new Date(end); start.setDate(end.getDate() - 7);
  }else if(periodFilter === 'thisMonth'){
    start = new Date(now.getFullYear(), now.getMonth(), 1);
    end = new Date(now.getFullYear(), now.getMonth() + 1, 1);
  }else if(periodFilter === 'lastMonth'){
    start = new Date(now.getFullYear(), now.getMonth() - 1, 1);
    end = new Date(now.getFullYear(), now.getMonth(), 1);
  }else{ return assignments; }
  return assignments.filter(function(a){
    if(!a.dueDate) return false;
    const d = new Date(a.dueDate);
    return d >= start && d < end;
  });
}

// ====== CLASS SELECTOR ======
function buildClassTabs(){

function refreshAll(){

}

// ====== STATS ======
function renderStats(){
  const students = studentsInClass(currentClass);
  const assignments = filterByPeriod(assignmentsInClass(currentClass));
  const totalS = students.length;

  let counts = {};
  ASSIGN_TYPES.forEach(t => { counts[t] = {done:0, miss:0, wrong:0} });

  assignments.forEach(a => {
    const type = a.type || '测试卷';
    students.forEach(s => {
      const sub = data.submissions.find(r=>r.studentId===s.id && r.assignmentId===a.id);
      if(sub && sub.status==='submitted'){
        counts[type].done++;
        counts[type].wrong += sub.wrongCount||0;
      } else {
        counts[type].miss++;
      }
    });
  });

  let totalDone = 0, totalMiss = 0, totalWrong = 0;
  Object.values(counts).forEach(c => { totalDone += c.done; totalMiss += c.miss; totalWrong += c.wrong; });
  const rate = (totalDone+totalMiss)>0 ? Math.round(totalDone/(totalDone+totalMiss)*100) : 0;

  let html = `
    <div class="stat-item b"><div class="num">${totalS}</div><div class="lbl">学生数</div></div>
    <div class="stat-item g"><div class="num">${rate}%</div><div class="lbl">总完成率</div></div>
    <div class="stat-item g"><div class="num">${totalDone}</div><div class="lbl">已完成人次</div></div>
    <div class="stat-item r"><div class="num">${totalMiss}</div><div class="lbl">未完成人次</div></div>`;

  // Per-type breakdown
  ASSIGN_TYPES.forEach(t => {
    if(assignments.some(a=>(a.type||'测试卷')===t)){
      const c = counts[t];
      const trate = (c.done+c.miss)>0 ? Math.round(c.done/(c.done+c.miss)*100) : 0;
      html += `<div class="stat-item p"><div class="num">${trate}%</div><div class="lbl">${t}完成率</div></div>`;
    }
  });

  html += `<div class="stat-item o"><div class="num">${totalWrong}</div><div class="lbl">累计错题</div></div>`;
  $('stats-bar').innerHTML = html;
}

// ====== QUICK SUBMIT ======
function renderQuickSubmit(){
  const sel = $('qs-assignment');
  const prev = sel.value;

  // Filter by class AND type AND period
  let filtered = filterByPeriod(assignmentsInClass(currentClass));
  if(typeFilter) filtered = filtered.filter(a=>(a.type||'测试卷')===typeFilter);

  sel.innerHTML = '<option value="">-- 选择作业 --</option>' +
    filtered.map(a => `<option value="${a.id}">[${esc(a.type||'测试卷')}] ${esc(a.title)} (${fd(a.dueDate)})</option>`).join('');
  if(prev && filtered.find(a=>a.id===parseInt(prev))) sel.value = prev;

  const aid = sel.value ? parseInt(sel.value) : null;
  const students = studentsInClass(currentClass);
  const grid = $('quick-submit-grid');

  if(!aid){
    grid.innerHTML = '<div class="empty">请先选择（或新建）一个作业</div>';
    return;
  }
  if(students.length === 0){
    grid.innerHTML = '<div class="empty">该班级还没有学生，请先添加学生</div>';
    return;
  }

  const assignment = ga(aid);
  const isTest = (assignment.type||'测试卷') === '测试卷';

  let doneCount = 0;
  let html = '';
  students.forEach(s => {
    const sub = data.submissions.find(r=>r.studentId===s.id && r.assignmentId===aid);
    const isDone = sub && sub.status==='submitted';
    if(isDone) doneCount++;
    const wrong = (sub && sub.wrongCount) ? sub.wrongCount : 0;

    let rightLabel = '';
    if(isDone){
      if(isTest && wrong > 0){
        rightLabel = `<span class="info" onclick="event.stopPropagation();openErrorModal(${s.id},${aid})" title="点击编辑错题">错${wrong}</span>`;
      } else {
        rightLabel = '<span style="color:#38a169;font-size:14px">✓</span>';
      }
    }

    html += `<div class="check-item ${isDone?'done':'undone'}" onclick="toggleSubmit(${s.id},${aid})" title="点击切换">
      <input type="checkbox" ${isDone?'checked':''} onclick="event.stopPropagation();toggleSubmit(${s.id},${aid})">
      <span class="name">${esc(s.name)}</span>
      ${rightLabel}
    </div>`;
  });

  const total = students.length;
  $('quick-submit-grid').innerHTML = `
    <div class="summary-row">${doneCount}/${total} 已完成 · ${total-doneCount} 未完成 · 类型：<span class="badge badge-info">${esc(assignment.type||'测试卷')}</span></div>
    <div class="check-grid">${html}</div>`;
}

function toggleSubmit(sid, aid){
  const idx = data.submissions.findIndex(r=>r.studentId===sid && r.assignmentId===aid);
  if(idx >= 0){
    data.submissions[idx].status = data.submissions[idx].status==='submitted' ? 'not_submitted' : 'submitted';
    if(data.submissions[idx].status==='submitted') data.submissions[idx].submittedAt = ts();
  } else {
    data.submissions.push({ id:Date.now(), studentId:sid, assignmentId:aid, status:'submitted', submittedAt:ts(), wrongCount:0, errors:[] });
  }
  save(); renderQuickSubmit(); renderStats(); renderErrorTable();
}

// ====== ERROR TABLE (only for 测试卷) ======
function renderErrorTable(){
  const aid = $('qs-assignment').value ? parseInt($('qs-assignment').value) : null;
  const assignment = aid ? ga(aid) : null;
  const students = studentsInClass(currentClass);

  if(!assignment){
    $('error-table').innerHTML = '<div class="empty">请先在上方选择作业</div>';
    return;
  }

  const isTest = (assignment.type||'测试卷') === '测试卷';
  if(!isTest){
    $('error-table').innerHTML = '<div class="empty" style="color:#718096">「'+esc(assignment.type||'测试卷')+'」类型无需录入错题，只记录完成即可</div>';
    return;
  }

  const submittedSubs = data.submissions.filter(r =>
    r.assignmentId === aid && r.status === 'submitted' &&
    students.some(s=>s.id===r.studentId)
  );

  if(submittedSubs.length === 0){
    $('error-table').innerHTML = '<div class="empty">该作业还没有学生提交</div>';
    return;
  }

  let rows = '';
  submittedSubs.forEach(sub => {
    const s = gs(sub.studentId);
    const errors = sub.errors || [];
    let errStr = errors.length>0
      ? errors.map(e => `<span style="display:inline-block;background:#edf2f7;padding:1px 5px;border-radius:3px;font-size:10px;margin:1px">第${e.questionNo}题：${esc((e.errorReasons||(e.errorReason?[e.errorReason]:[])).join('、')||'未标注')}</span>`).join(' ')
      : '<span style="color:#a0aec0">--</span>';
    const score = assignment.totalQuestions>0
      ? Math.round((assignment.totalQuestions-(sub.wrongCount||0))/assignment.totalQuestions*100)
      : '-';

    rows += `<tr>
      <td><strong>${esc(s?s.name:'?')}</strong></td>
      <td>${assignment.totalQuestions>0 ? (sub.wrongCount||0)+' / '+assignment.totalQuestions : '错'+(sub.wrongCount||0)+'题'}</td>
      <td>${score}${score!=='-'?'分':''}</td>
      <td>${errStr}</td>
      <td class="actions"><button class="btn btn-xs btn-p" onclick="openErrorModal(${sub.studentId},${aid})">编辑</button></td>
    </tr>`;
  });

  $('error-table').innerHTML = `<div class="tbl-wrap"><table>
    <thead><tr><th>学生</th><th>错题</th><th>得分</th><th>错因</th><th>操作</th></tr></thead>
    <tbody>${rows}</tbody></table></div>`;
}

// ====== ERROR MODAL ======
function openErrorModal(sid, aid){
  const student = gs(sid);
  const assignment = ga(aid);
  if(!student || !assignment) return;
  const sub = data.submissions.find(r=>r.studentId===sid && r.assignmentId===aid);
  const existing = (sub && sub.errors) ? sub.errors : [];
  const totalQ = assignment.totalQuestions || 0;

  // Build map: questionNo -> errorReasons
  const errMap = {};
  existing.forEach(function(e){
    const reasons = e.errorReasons || (e.errorReason ? [e.errorReason] : []);
    errMap[e.questionNo] = reasons;
  });

  // Find max question number from existing errors (for auto-detection)
  let maxQ = totalQ;
  if(maxQ === 0 && existing.length > 0){
    maxQ = Math.max.apply(null, existing.map(function(e){ return e.questionNo || 0; }));
  }

  let html = '<h3 style="margin-bottom:6px">错题录入 — ' + esc(student.name) + ' — ' + esc(assignment.title) + '</h3>';
  html += '<div class="f-row" style="align-items:flex-end"><div class="f-grp"><label>共几题</label><input type="number" id="err-total-q" value="'+(totalQ||maxQ||10)+'" min="1" style="width:70px" onchange="redrawErrGrid('+sid+','+aid+')"></div><span style="font-size:11px;color:#718096;display:flex;align-items:flex-end">点击题号标记错题</span></div>';

  html += '<div id="err-grid-area">' + buildErrGridHTML(errMap, totalQ||maxQ||10) + '</div>';

  html += '<div class="btn-group" style="margin-top:10px;justify-content:flex-end">';
  html += '<button class="btn btn-o" onclick="closeModal()">取消</button>';
  html += '<button class="btn btn-p" id="save-err">保存</button></div>';

  $('modal-inner').innerHTML = html;
  $('modal').classList.add('on');
  $('modal-inner').style.maxWidth = '680px';

  $('save-err').onclick = function(){
    const curTotal = parseInt($('err-total-q').value)||10;
    // Save totalQuestions to assignment (so you only set it once)
    assignment.totalQuestions = curTotal;
    const errors = [];
    for(let q=1; q<=curTotal; q++){
      const reasons = [];
      ERROR_REASONS.forEach(function(r,j){
        const cb = document.getElementById('er-'+q+'-'+j);
        if(cb && cb.checked) reasons.push(r);
      });
      if(reasons.length > 0){
        errors.push({ questionNo: q, errorReasons: reasons });
      }
    }
    let idx = data.submissions.findIndex(r=>r.studentId===sid && r.assignmentId===aid);
    if(idx<0){ data.submissions.push({ id:Date.now(), studentId:sid, assignmentId:aid, status:'submitted', submittedAt:ts(), wrongCount:0, errors:[] }); idx=data.submissions.length-1; }
    data.submissions[idx].wrongCount = errors.length;
    data.submissions[idx].errors = errors;
    data.submissions[idx].status = 'submitted';
    save(); closeModal(); $('modal-inner').style.maxWidth = ''; refreshAll();
  };
}

function redrawErrGrid(sid, aid){
  const curTotal = parseInt(document.getElementById('err-total-q').value)||10;
  const errMap = getCurrentErrMap(curTotal);
  const area = document.getElementById('err-grid-area');
  if(area) area.innerHTML = buildErrGridHTML(errMap, curTotal);
}

function buildErrGridHTML(errMap, totalQ){
  let html = '<div class="q-grid" id="q-grid">';
  for(let q=1; q<=totalQ; q++){
    const isWrong = errMap[q] !== undefined;
    html += '<div class="q-tile ' + (isWrong?'wrong':'ok') + '" id="qt-'+q+'" onclick="toggleQTile('+q+','+totalQ+')" title="点击标记对/错">'+q+'</div>';
  }
  html += '</div>';
  html += '<div id="err-detail-area" style="margin-top:10px">';
  html += buildErrDetailHTML(errMap, totalQ);
  html += '</div>';
  return html;
}

function toggleQTile(q, totalQ){
  const tile = document.getElementById('qt-'+q);
  if(!tile) return;
  const wasWrong = tile.classList.contains('wrong');
  if(wasWrong){
    tile.classList.remove('wrong');
    tile.classList.add('ok');
    // Uncheck all error reasons for this question
    ERROR_REASONS.forEach(function(r,j){
      const cb = document.getElementById('er-'+q+'-'+j);
      if(cb) cb.checked = false;
    });
  } else {
    tile.classList.remove('ok');
    tile.classList.add('wrong');
  }
  // Rebuild the detail area
  const area = document.getElementById('err-detail-area');
  if(area){
    area.innerHTML = buildErrDetailHTML(getCurrentErrMap(totalQ), totalQ);
  }
}

function getCurrentErrMap(totalQ){
  const map = {};
  for(let q=1; q<=totalQ; q++){
    const tile = document.getElementById('qt-'+q);
    if(tile && tile.classList.contains('wrong')){
      const reasons = [];
      ERROR_REASONS.forEach(function(r,j){
        const cb = document.getElementById('er-'+q+'-'+j);
        if(cb && cb.checked) reasons.push(r);
      });
      map[q] = reasons;
    }
  }
  return map;
}

function buildErrDetailHTML(errMap, totalQ){
  const wrongNums = [];
  for(let q=1; q<=totalQ; q++){
    if(errMap[q] !== undefined) wrongNums.push(q);
  }
  if(wrongNums.length === 0){
    return '<p style="font-size:12px;color:#a0aec0;text-align:center;padding:12px">点击上方的题号标记错题</p>';
  }
  let html = '';
  wrongNums.forEach(function(q){
    const existingReasons = errMap[q] || [];
    html += '<div style="margin-bottom:6px;padding:6px 8px;background:#fff5f5;border-radius:6px;border:1px solid #fed7d7">';
    html += '<strong style="font-size:12px;color:#c53030">第'+q+'题</strong>';
    html += '<div class="err-check-grid" style="margin-top:3px">';
    ERROR_REASONS.forEach(function(r,j){
      html += '<label class="err-check"><input type="checkbox" id="er-'+q+'-'+j+'" value="'+esc(r)+'" '+(existingReasons.indexOf(r)>=0?'checked':'')+'><span>'+esc(r)+'</span></label>';
    });
    html += '</div></div>';
  });
  return html;
}

// ====== STUDENT LIST ======
function renderStudentList(){
  const students = studentsInClass(currentClass);
  if(students.length===0){ $('student-list').innerHTML='<div class="empty">暂无学生</div>'; return; }
  let html = '<table><thead><tr><th>姓名</th><th>班级</th><th>完成率</th><th>错题</th><th>操作</th></tr></thead><tbody>';
  students.forEach(s => {
    const classAssignIds = new Set(filterByPeriod(assignmentsInClass(currentClass)).map(a=>a.id));
    const allSubs = data.submissions.filter(r=>r.studentId===s.id && classAssignIds.has(r.assignmentId));
    const doneSubs = allSubs.filter(r=>r.status==='submitted');
    const totalWrong = allSubs.reduce((sum,r)=>sum+(r.wrongCount||0),0);
    const completeRate = allSubs.length>0 ? Math.round(doneSubs.length/allSubs.length*100) : '-';
    html += `<tr>
      <td><strong>${esc(s.name)}</strong></td><td>${esc(s.group)}</td>
      <td>${completeRate==='-'?'-':`<span class="badge ${completeRate>=80?'badge-ok':completeRate>=50?'badge-warn':'badge-no'}">${completeRate}%</span>`}</td>
      <td><span class="badge ${totalWrong===0?'badge-ok':totalWrong<=5?'badge-warn':'badge-no'}">${totalWrong}题</span></td>
      <td class="actions">
        <button class="btn btn-xs btn-o" onclick="openEditStudent(${s.id})">编辑</button>
        <button class="btn btn-xs btn-r" onclick="deleteStudent(${s.id})">删除</button></td></tr>`;
  });
  html += '</tbody></table>';
  $('student-list').innerHTML = html;
}

function deleteStudent(id){
  if(!confirm('确定删除该学生？相关提交记录也会删除。')) return;
  data.students=data.students.filter(s=>s.id!==id);
  data.submissions=data.submissions.filter(r=>r.studentId!==id);
  save(); refreshAll();
}

// ====== ASSIGNMENT LIST ======
function renderAssignmentList(){
  const assignments = filterByPeriod(assignmentsInClass(currentClass));
  if(assignments.length===0){ $('assignment-list').innerHTML='<div class="empty">暂无作业</div>'; return; }
  const students = studentsInClass(currentClass);
  let html = '<table><thead><tr><th>标题</th><th>类型</th><th>截止</th><th>完成率</th><th>操作</th></tr></thead><tbody>';
  assignments.slice().reverse().forEach(a => {
    let done=0;
    students.forEach(s=>{ const sub=data.submissions.find(r=>r.studentId===s.id&&r.assignmentId===a.id); if(sub&&sub.status==='submitted') done++; });
    const pct=students.length>0?Math.round(done/students.length*100):0;
    const atype = a.type||'测试卷';
    const typeCls = atype==='复习作业'?'type-fuxi':atype==='测试卷'?'type-ceshi':atype==='习题'?'type-xiti':'type-lianxi';
    html += `<tr>
      <td><strong>${esc(a.title)}</strong></td>
      <td><span class="badge ${typeCls}">${esc(atype)}</span></td>
      <td>${fd(a.dueDate)}</td>
      <td><div style="display:flex;align-items:center;gap:5px"><div class="pbar" style="flex:1"><div class="pfill" style="width:${pct}%;background:${pct>=80?'#38a169':pct>=50?'#dd6b20':'#e53e3e'}"></div></div><span style="font-size:10px">${done}/${students.length}</span></div></td>
      <td class="actions"><button class="btn btn-xs btn-o" onclick="openEditAssignment(${a.id})">编辑</button><button class="btn btn-xs btn-r" onclick="deleteAssignment(${a.id})">删除</button></td></tr>`;
  });
  html += '</tbody></table>';
  $('assignment-list').innerHTML = html;
}

    <div class="btn-group" style="margin-top:10px;justify-content:flex-end">
      <button class="btn btn-o" onclick="closeModal()">取消</button>
      <button class="btn btn-p" id="sv-asg">保存</button></div>`;
  $('modal').classList.add('on');
  $('sv-asg').onclick=function(){ a.title=$('asg-title').value.trim(); a.classGroup=$('asg-class').value; a.type=$('asg-type').value; a.dueDate=$('asg-due').value; a.dueDate=$('asg-due').value; save(); closeModal(); refreshAll(); };
}

function deleteAssignment(id){
  if(!confirm('确定删除该作业？相关提交记录也会删除。')) return;
  data.assignments=data.assignments.filter(a=>a.id!==id);
  data.submissions=data.submissions.filter(r=>r.assignmentId!==id);
  save(); refreshAll();
}

// ====== MODAL ======
function closeModal(){ $('modal').classList.remove('on') }
$('modal').addEventListener('click',function(e){ if(e.target===this) closeModal() })
document.addEventListener('keydown',function(e){ if(e.key==='Escape') closeModal() })

// ====== IMPORT/EXPORT ======
function exportData(){
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='sbs-backup-'+new Date().toISOString().slice(0,10)+'.json'; a.click(); URL.revokeObjectURL(a.href);
}
function importDataPrompt(){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='.json';
  inp.onchange=function(e){
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=function(e){
      try{
        const imp=JSON.parse(e.target.result);
        if(imp.students&&imp.assignments&&imp.submissions){
          if(confirm(`导入 ${imp.students.length} 名学生、${imp.assignments.length} 次作业、${imp.submissions.length} 条记录。\n\n这会覆盖当前数据，确定吗？`)){ data=imp; save(); closeModal(); refreshAll(); buildClassTabs(); alert('导入成功！') }
        }else{alert('文件格式不正确')}
      }catch(err){alert('解析失败: '+err.message)}
    }; reader.readAsText(file);
  }; inp.click();
}

// ====== PWA ======
(function(){
  // Manifest as blob URL (keeps everything in one file)
  const manifest = {
    name: 'SBS 英语作业追踪',
    short_name: 'SBS作业',
    description: 'SBS班级作业提交与错题追踪系统',
    start_url: location.href,
    display: 'standalone',
    orientation: 'any',
    background_color: '#f0f4f8',
    theme_color: '#2b6cb0',
    icons: [{
      src: 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192"><rect fill="#2b6cb0" width="192" height="192" rx="32"/><text x="96" y="128" text-anchor="middle" fill="white" font-size="96" font-family="sans-serif" font-weight="bold">S</text></svg>'),
      sizes: '192x192', type: 'image/svg+xml', purpose: 'any maskable'
    }]
  };
  const manifestBlob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
  const manifestUrl = URL.createObjectURL(manifestBlob);
  const link = document.createElement('link');
  link.rel = 'manifest'; link.href = manifestUrl;
  document.head.appendChild(link);

  // Service Worker for offline cache
  if('serviceWorker' in navigator){
    const swCode = `
      const CACHE = 'sbs-tracker-v1';
      const URLS = ['${location.href}'];
      self.addEventListener('install', e => {
        e.waitUntil(caches.open(CACHE).then(c => c.addAll(URLS)).catch(()=>{}));
        self.skipWaiting();
      });
      self.addEventListener('fetch', e => {
        e.respondWith(
          caches.match(e.request).then(r => r || fetch(e.request).then(resp => {
            if(resp.ok){ const clone = resp.clone(); caches.open(CACHE).then(c => c.put(e.request, clone)); }
            return resp;
          }).catch(() => caches.match(e.request)))
        );
      });
    `;
    const swBlob = new Blob([swCode], {type:'application/javascript'});
    const swUrl = URL.createObjectURL(swBlob);
    navigator.serviceWorker.register(swUrl).catch(()=>{});
  }

  // Install prompt
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', function(e){
    e.preventDefault();
    deferredPrompt = e;
  });
})();

// ====== INIT ======
load();
buildClassTabs();
updateSyncUI();
refreshAll();
// Check cloud for newer data on startup
syncFromCloud().then(function(didSync){
  if(didSync){ refreshAll(); buildClassTabs(); }
});
</script>
